name: Daily Contributions

on:
  schedule:
  - cron: '35 23 * * *'  # 11:35 PM UTC = 3:35 AM Oman time
  workflow_dispatch:

jobs:
  daily-commits:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Git user
        run: |
          git config --global user.name "Dippp10"
          git config --global user.email "deepikakarthik697@gmail.com"

      - name: Generate 100000 commits
        run: |
          touch activity.md
          for i in $(seq 1 100000); do
            echo "Commit $i on $(date)" >> activity.md
            git add activity.md
            git commit -m "Automated commit #$i"
          done

      - name: Push changes
        run: git push origin main

